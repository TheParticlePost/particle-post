<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0D1117"/>
  <!-- Atom nucleus -->
  <circle cx="32" cy="32" r="5" fill="#2563EB"/>
  <!-- Electron orbit 1 -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Electron orbit 2 (rotated 60deg) -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.6"
    transform="rotate(60 32 32)"/>
  <!-- Electron orbit 3 (rotated 120deg) -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.4"
    transform="rotate(120 32 32)"/>
  <!-- Electrons (dots on orbits) -->
  <circle cx="54" cy="32" r="2.5" fill="#F59E0B"/>
  <circle cx="21" cy="22.4" r="2.5" fill="#F59E0B"/>
  <circle cx="21" cy="41.6" r="2.5" fill="#F59E0B"/>
</svg>
