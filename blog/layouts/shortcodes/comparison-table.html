<div class="comparison-table-container">
  <table class="comparison-table">
    {{ $headers := split (.Get "headers") "," }}
    <thead>
      <tr>
        {{ range $headers }}
        <th>{{ . }}</th>
        {{ end }}
      </tr>
    </thead>
    <tbody>
      {{ $rows := split (.Get "rows") "|" }}
      {{ range $rows }}
        <tr>
          {{ $cells := split . ":" }}
          {{ range $cells }}
          <td>{{ . }}</td>
          {{ end }}
        </tr>
      {{ end }}
    </tbody>
  </table>
  {{ with .Get "source" }}<span class="comparison-table-source">Source: {{ . }}</span>{{ end }}
</div>
