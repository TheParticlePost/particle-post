{{- with site.Params.homeInfoParams }}
<article class="first-entry home-info">
  <header class="entry-header">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      Published twice daily
    </div>
    <h1>{{ .Title | markdownify }}</h1>
  </header>
  <div class="entry-content">
    {{ .Content | markdownify }}
  </div>
  <div class="hero-ctas">
    {{- $latest := index site.RegularPages 0 }}
    {{- with $latest }}
    <a href="{{ .Permalink }}" class="btn-primary">Read Latest &rarr;</a>
    {{- end }}
  </div>
  <div class="hero-stats">
    <span>AI-researched</span>
    <span class="hero-stat-sep">·</span>
    <span>Finance &amp; Business</span>
    <span class="hero-stat-sep">·</span>
    <span>No hype, just signal</span>
  </div>
</article>
{{- end -}}
