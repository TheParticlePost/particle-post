<!-- Google Fonts: Inter (body) + Plus Jakarta Sans (headings) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

<!-- BreadcrumbList schema (all pages) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ .Site.BaseURL | jsonify }}
    }{{- if .IsPage }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ .Title | jsonify }},
      "item": {{ .Permalink | jsonify }}
    }{{- end }}
  ]
}
</script>

{{- if .IsPage }}
<!-- Article schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": {{ if eq .Params.schema_type "NewsArticle" }}"NewsArticle"{{ else }}"Article"{{ end }},
  "headline": {{ .Title | jsonify }},
  "description": {{ .Params.description | default .Summary | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "wordCount": {{ .WordCount }},
  "articleSection": {{ index .Params.categories 0 | default "Technology" | jsonify }},
  "keywords": {{ .Params.keywords | default slice | jsonify }},
  "author": {
    "@type": "Organization",
    "name": "Particle Post Editorial Team",
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": "Particle Post",
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
  {{- with .Params.cover.image }},
  "image": {{ . | jsonify }}
  {{- end }}
}
</script>

{{- if .Params.has_faq }}
<!-- FAQPage schema (GSO — AI engine extraction) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $i, $faq := .Params.faq_pairs }}
    {{- if $i }},{{- end }}
    {
      "@type": "Question",
      "name": {{ $faq.q | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ $faq.a | jsonify }}
      }
    }
    {{- end }}
  ]
}
</script>
{{- end }}
{{- end }}
