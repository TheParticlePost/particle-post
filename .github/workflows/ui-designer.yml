name: UI Designer — Directive Mode (2pm ET)

on:
  # Primary trigger: native GitHub cron at 18:00 UTC daily (2pm ET during DST,
  # 1 PM ET during standard time — accept the 1h winter drift).
  # Fallback triggers (Cloudflare Worker, cron-job.org) are de-duplicated by
  # the `guard` job below — double-triggers cannot produce double-runs.
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch: {}    # manual trigger for testing

permissions:
  contents: write
  actions: read     # required for the guard job's `gh run list` lookup

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Skip if a recent successful run exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WINDOW_HOURS=20
          CUTOFF=$(date -u -d "${WINDOW_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)
          RECENT=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --status success \
            --created ">${CUTOFF}" \
            --json databaseId \
            --jq "map(select(.databaseId != ${{ github.run_id }})) | length")
          if [ "${RECENT:-0}" -gt 0 ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — ${RECENT} successful run(s) in the last ${WINDOW_HOURS}h"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  design:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run UI Designer (directive mode)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.ui_run --mode directive

      - name: Commit UI changes
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add \
            blog/assets/css/extended/custom.css \
            blog/layouts/partials/header.html \
            blog/layouts/partials/home_info.html \
            blog/layouts/_default/list.html \
            blog/layouts/partials/footer.html \
            pipeline/config/ui_change_history.json
          git diff --staged --quiet || git commit -m "auto: ui design update $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
