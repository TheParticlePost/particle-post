name: Backfill Pulse + Regenerate Covers (one-off)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python -m playwright install chromium --with-deps

      - name: Regenerate Klarna cover + update frontmatter
        env:
          SUPABASE_URL: https://uzgywmjexciknmpbebqs.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -c "
          import sys, os, re
          sys.path.insert(0, os.getcwd())

          from pipeline.graphics.templates import cover_case_study
          from pipeline.graphics.renderer import render_sync
          from pipeline.graphics.uploader import upload_to_supabase

          # Regenerate Klarna cover
          svg = cover_case_study(
              'Klarna AI Customer Service: What the Real Numbers Show',
              '2.3M chats/month',
              '22% satisfaction drop',
          )
          render_sync(svg, '/tmp/klarna-cover.png')
          url = upload_to_supabase('/tmp/klarna-cover.png', 'covers', 'klarna-ai-customer-service-case-study.png')
          print(f'Klarna cover URL: {url}')

          if url:
              # Update the article frontmatter
              path = 'blog/content/posts/2026-04-05-klarna-ai-customer-service-case-study.md'
              content = open(path, encoding='utf-8').read()
              # Replace picsum placeholder URLs with Supabase cover URL
              content = re.sub(
                  r'https://picsum\.photos/seed/[^\s\"]+',
                  url,
                  content,
              )
              open(path, 'w', encoding='utf-8').write(content)
              print(f'Updated frontmatter in {path}')
          "

      - name: Commit updated cover
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git add blog/content/posts/
          git diff --staged --quiet || git commit -m "fix: regenerate Klarna case study cover (replace picsum placeholder)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
