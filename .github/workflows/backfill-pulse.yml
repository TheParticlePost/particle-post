name: Backfill Pulse + Regenerate Covers (one-off)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python -m playwright install chromium --with-deps

      - name: Regenerate case study covers
        env:
          SUPABASE_URL: https://uzgywmjexciknmpbebqs.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -c "
          import sys, os, re
          sys.path.insert(0, os.getcwd())

          from pipeline.graphics.templates import cover_case_study
          from pipeline.graphics.renderer import render_sync
          from pipeline.graphics.uploader import upload_to_supabase

          covers = [
              {
                  'title': 'Klarna AI Customer Service: What the Real Numbers Show',
                  'company': 'Klarna AI Customer Service',
                  'metric': '\$40M saved',
                  'slug': 'klarna-ai-customer-service-case-study',
              },
              {
                  'title': 'Walmart AI Supply Chain: How It Cut Costs 40%',
                  'company': 'Walmart AI Supply Chain',
                  'metric': '40% cost reduction',
                  'slug': 'walmart-ai-supply-chain-cost-reduction-blueprint',
              },
          ]

          for c in covers:
              svg = cover_case_study(c['title'], c['company'], c['metric'])
              tmp = f\"/tmp/{c['slug']}-cover.png\"
              render_sync(svg, tmp)
              url = upload_to_supabase(tmp, 'covers', f\"{c['slug']}.png\")
              print(f\"{c['slug']}: {url}\")

              if url:
                  path = f\"blog/content/posts/2026-04-05-{c['slug']}.md\"
                  if os.path.exists(path):
                      content = open(path, encoding='utf-8').read()
                      content = re.sub(
                          r'https://(?:picsum\.photos/seed/[^\s\"]+|uzgywmjexciknmpbebqs\.supabase\.co/storage/v1/object/public/covers/[^\s\"]+)',
                          url,
                          content,
                      )
                      open(path, 'w', encoding='utf-8').write(content)
                      print(f'Updated: {path}')

          print('Done.')
          "

      - name: Commit updated cover
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git add blog/content/posts/
          git diff --staged --quiet || git commit -m "fix: regenerate case study covers with correct company names"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
