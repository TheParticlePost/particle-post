name: Morning Post (9am ET)

on:
  # Cron scheduling handled by cron-job.org (job ID 7411448, 13:00 UTC daily)
  # GitHub Actions built-in schedule removed to prevent double-triggers
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip file write)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Run morning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY }}
          NEWS_API_KEY: ${{ secrets.NEWSAPI }}
          PEXELS_API_KEY: ${{ secrets.PEXELS }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m pipeline.run --slot morning $DRY_RUN_FLAG

      - name: Build Hugo site
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: hugo --source blog/ --destination ../public/ --minify

      - name: Commit new post
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add blog/content/posts/ blog/data/topics_history.json pipeline/data/writer_feedback.json pipeline/config/post_index.json pipeline/config/seo_gso_config.json blog/static/llms.txt blog/static/llms-full.txt
          git diff --staged --quiet || git commit -m "auto: morning post $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Deploy to GitHub Pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./public
          cname: theparticlepost.com
