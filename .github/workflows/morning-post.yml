# SECURITY NOTE: This workflow pushes directly to main (required for automated
# content publishing). The GH_PAT token is scoped to this repo only.
# Risk accepted: if the token is compromised, attacker can push to main.
# Mitigation: token rotation, workflow-level permissions restricted to contents:write.
name: Morning Post (9am ET)

on:
  # Native GitHub cron at 13:00 UTC daily (9 AM ET during DST, 8 AM ET during
  # standard time — accept the 1h winter drift). The `guard` job below
  # de-duplicates double-triggers within a 20h window.
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip file write)"
        required: false
        default: "false"
        type: boolean
      topic:
        description: "Topic directive — force the pipeline to write about this topic"
        required: false
        default: ""
        type: string
      content_type:
        description: "Override content type (news_analysis, deep_dive, case_study, how_to, technology_profile, industry_briefing)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: read     # required for the guard job's `gh run list` lookup

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Skip if a recent successful run exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — bypassing recent-run guard"
            exit 0
          fi
          WINDOW_HOURS=20
          CUTOFF=$(date -u -d "${WINDOW_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)
          RECENT=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --status success \
            --created ">${CUTOFF}" \
            --json databaseId \
            --jq "map(select(.databaseId != ${{ github.run_id }})) | length")
          if [ "${RECENT:-0}" -gt 0 ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — ${RECENT} successful run(s) in the last ${WINDOW_HOURS}h"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js (for lib/covers/ TS cover generator)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright for graphics rendering
        run: |
          python -m playwright install chromium --with-deps
          npx playwright install chromium

      - name: Run morning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY }}
          NEWS_API_KEY: ${{ secrets.NEWSAPI }}
          PEXELS_API_KEY: ${{ secrets.PEXELS }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: https://uzgywmjexciknmpbebqs.supabase.co
          NEXT_PUBLIC_SUPABASE_URL: https://uzgywmjexciknmpbebqs.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PUBLIC_KEY }}
        run: |
          ARGS="--slot morning"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            ARGS="$ARGS --topic \"$TOPIC\""
          fi
          CT="${{ github.event.inputs.content_type }}"
          if [ -n "$CT" ]; then
            ARGS="$ARGS --content-type $CT"
          fi
          python -m pipeline.run $ARGS

      - name: Commit new post
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add blog/content/posts/ blog/data/topics_history.json pipeline/data/writer_feedback.json pipeline/config/post_index.json pipeline/config/seo_gso_config.json blog/static/llms.txt blog/static/llms-full.txt pipeline/logs/costs/ pipeline/data/research_memory.json pipeline/data/topic_performance.json
          git diff --staged --quiet || git commit -m "auto: morning post $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done

      # Vercel GitHub App auto-deploys on push to main — no explicit trigger needed
