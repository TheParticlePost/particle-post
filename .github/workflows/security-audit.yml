name: Security Audit (Daily Midnight ET)

on:
  # Native GitHub cron at 05:00 UTC daily (1 AM ET during DST, midnight ET
  # during standard time — accept the 1h summer drift). The `guard` job below
  # de-duplicates double-triggers within a 20h window.
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read     # required for the guard job's `gh run list` lookup

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Skip if a recent successful run exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — bypassing recent-run guard"
            exit 0
          fi
          WINDOW_HOURS=20
          CUTOFF=$(date -u -d "${WINDOW_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)
          RECENT=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --status success \
            --created ">${CUTOFF}" \
            --json databaseId \
            --jq "map(select(.databaseId != ${{ github.run_id }})) | length")
          if [ "${RECENT:-0}" -gt 0 ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — ${RECENT} successful run(s) in the last ${WINDOW_HOURS}h"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  audit:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Run security scan
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PEXELS_API_KEY: ${{ secrets.PEXELS }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_KEY }}
        run: python -m pipeline.security_run
        continue-on-error: true

      - name: Commit security logs and auto-fixes
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git add pipeline/logs/security/ pipeline/config/security_config.json blog/content/posts/
          git diff --staged --quiet || git commit -m "security: daily scan $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
