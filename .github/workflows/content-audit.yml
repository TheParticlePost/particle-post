name: Content Quality Audit (Monday 10am ET)

on:
  # Scheduling handled by cron-job.org + Cloudflare Worker (Mon 14:00 UTC)
  workflow_dispatch: {}   # manual trigger for testing

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run content quality audit
        run: python -m pipeline.content_audit_run

      - name: Commit audit results
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add pipeline/data/writer_feedback.json
          git diff --staged --quiet || git commit -m "auto: content quality audit $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
