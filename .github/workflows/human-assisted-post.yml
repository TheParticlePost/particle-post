name: Human-Assisted Post

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Article topic / direction"
        required: true
        type: string
      sources:
        description: "Source URLs (semicolon-separated)"
        required: false
        default: ""
        type: string
      key_points:
        description: "Key points / direction (semicolon-separated)"
        required: false
        default: ""
        type: string
      slot:
        description: "Publishing slot"
        required: false
        default: "morning"
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run human-assisted pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY }}
          NEWS_API_KEY: ${{ secrets.NEWSAPI }}
          PEXELS_API_KEY: ${{ secrets.PEXELS }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          ARGS="--slot ${{ inputs.slot }} --topic \"${{ inputs.topic }}\""
          SOURCES="${{ inputs.sources }}"
          KEY_POINTS="${{ inputs.key_points }}"
          if [ -n "$SOURCES" ]; then
            ARGS="$ARGS --sources \"$SOURCES\""
          fi
          if [ -n "$KEY_POINTS" ]; then
            ARGS="$ARGS --key-points \"$KEY_POINTS\""
          fi
          eval python -m pipeline.human_run $ARGS

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "content: human-assisted post — ${{ inputs.topic }}"
          branch: human-post/${{ github.run_id }}
          title: "[Human Post] ${{ inputs.topic }}"
          body: |
            ## Human-Assisted Post

            **Topic:** ${{ inputs.topic }}
            **Slot:** ${{ inputs.slot }}
            **Sources:** ${{ inputs.sources || 'None provided' }}
            **Key Points:** ${{ inputs.key_points || 'None provided' }}

            ---

            This article was generated by the human-assisted pipeline.
            Review the content and merge to publish.
          labels: human-assisted
          add-paths: |
            blog/content/posts/
            blog/data/topics_history.json
            pipeline/data/writer_feedback.json
            pipeline/config/post_index.json
            pipeline/config/seo_gso_config.json
            blog/static/llms.txt
            blog/static/llms-full.txt
            pipeline/logs/costs/
