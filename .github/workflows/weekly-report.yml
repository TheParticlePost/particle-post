name: Weekly Report (Friday 8pm ET)

on:
  # Cron scheduling handled by cron-job.org (job ID 7411451, Saturday 00:00 UTC)
  # GitHub Actions built-in schedule removed to prevent double-triggers
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Send weekly report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m pipeline.weekly_report_run
