name: UI Proactive Audit

on:
  # Scheduling handled by cron-job.org + Cloudflare Worker (3x/day: 15:00, 19:00, 23:00 UTC)
  workflow_dispatch: {}   # manual trigger for testing

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run UI Auditor (proactive mode)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.ui_run --mode audit

      - name: Commit UI changes
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add \
            blog/assets/css/extended/custom.css \
            blog/layouts/ \
            pipeline/config/ui_change_history.json \
            pipeline/config/ui_backlog.json
          git diff --staged --quiet || git commit -m "auto: ui audit $(date -u +%Y-%m-%d-%H%M)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
