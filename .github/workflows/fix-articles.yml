name: Fix Published Articles

on:
  workflow_dispatch:
    inputs:
      fix_mode:
        description: "Fix mode: images, links, style, or all"
        required: true
        default: "all"
        type: choice
        options:
          - images
          - links
          - style
          - sources
          - all
      file_pattern:
        description: "File glob pattern (default: all posts)"
        required: false
        default: "blog/content/posts/*.md"

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml python-dotenv

      - name: Run article fixes
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python -m pipeline.modify_run \
            --fix-${{ inputs.fix_mode }} \
            ${{ inputs.file_pattern }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/content/posts/
          git diff --staged --quiet || git commit -m "fix: auto-repair articles (${{ inputs.fix_mode }})"
          git push
