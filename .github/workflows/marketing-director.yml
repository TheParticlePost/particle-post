name: Marketing Director (noon ET)

on:
  # Cron scheduling handled by cron-job.org (job ID 7411449, 16:00 UTC daily)
  # GitHub Actions built-in schedule removed to prevent double-triggers
  workflow_dispatch: {}    # manual trigger for testing

permissions:
  contents: write
  id-token: write   # required for Workload Identity Federation

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Marketing Director analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
          BING_WEBMASTER_KEY: ${{ secrets.BING_WEBMASTER_KEY }}
        run: python -m pipeline.marketing_run

      - name: Commit updated strategy files
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add \
            pipeline/config/seo_guidelines.md \
            pipeline/config/marketing_strategy.json \
            pipeline/config/editorial_guidelines.md \
            pipeline/config/ui_directives.json \
            pipeline/config/seo_gso_config.json \
            "pipeline/logs/marketing/"
          git diff --staged --quiet || git commit -m "auto: marketing analysis $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
