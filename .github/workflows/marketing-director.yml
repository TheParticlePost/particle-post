name: Marketing Director (noon ET)

on:
  # Native GitHub cron at 16:00 UTC daily (noon ET during DST, 11 AM ET
  # during standard time — accept the 1h winter drift).
  # The `guard` job below de-duplicates double-triggers within a 20h window,
  # so adding any other dispatcher in the future is safe.
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch: {}    # manual trigger for testing

permissions:
  contents: write
  id-token: write   # required for Workload Identity Federation
  actions: read     # required for the guard job's `gh run list` lookup

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Skip if a recent successful run exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manual workflow_dispatch invocations always proceed — never block
          # a human from re-running a workflow on demand.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — bypassing recent-run guard"
            exit 0
          fi
          # Schedule trigger: skip if a recent successful run already covered
          # this slot. Window is sized smaller than the natural cadence so
          # legitimate runs always fire, but extra dispatches are no-ops.
          WINDOW_HOURS=20
          CUTOFF=$(date -u -d "${WINDOW_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)
          RECENT=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --status success \
            --created ">${CUTOFF}" \
            --json databaseId \
            --jq "map(select(.databaseId != ${{ github.run_id }})) | length")
          if [ "${RECENT:-0}" -gt 0 ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — ${RECENT} successful run(s) in the last ${WINDOW_HOURS}h"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CREWAI_TRACING_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Marketing Director analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
          BING_WEBMASTER_KEY: ${{ secrets.BING_WEBMASTER_KEY }}
          SUPABASE_URL: https://uzgywmjexciknmpbebqs.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m pipeline.marketing_run

      - name: Commit updated strategy files
        run: |
          git config user.name "Particle Post Bot"
          git config user.email "bot@particlepost.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add \
            pipeline/config/seo_guidelines.md \
            pipeline/config/marketing_strategy.json \
            pipeline/config/editorial_guidelines.md \
            pipeline/config/ui_directives.json \
            pipeline/config/seo_gso_config.json \
            "pipeline/logs/marketing/"
          git diff --staged --quiet || git commit -m "auto: marketing analysis $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
